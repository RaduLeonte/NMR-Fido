name: Build

on: [push, pull_request]

jobs:
    build:
        name: Build binaries [${{ matrix.os }}-${{ matrix.python-version}}]
        strategy:
            matrix:
                include:
                    - os: macos-14
                    - os: windows-2019
                    - os: ubuntu-20.04
                python-version: ['3.11']
        runs-on: "${{ matrix.os }}"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup python [${{ matrix.python-version }}]
              uses: actions/setup-python@v4
              with:
                python-version: ${{ matrix.python-version }}

            - name: Install poetry
              uses: Gr1N/setup-poetry@v8

            - name: Install dependencies
              run: |
                poetry run pip install --upgrade pip setuptools
                poetry install

            - name: Build python releases
              run: |
                poetry build

            - name: Build executable => Linux
              if: ${{ !startsWith(matrix.os, 'windows') }}
              run: |
                poetry run pip install nuitka
                poetry run python -m nuitka \
                  --standalone \
                  --onefile \
                  src/main.py

            - name: Build executable => Windows
              if: ${{ startsWith(matrix.os, 'windows') }}
              run: |
                poetry run pip install nuitka
                poetry run python -m nuitka `
                  --standalone `
                  --onefile `
                  src/main.py
            
            - name: Upload builds
              uses: actions/upload-artifact@v3
              with:
                name: built-binary
                path: |
                  dist/*.whl
                  dist/*.tar.gz
                  build/*.exe
                  build/*.bin

    finalize:
        name: Finalize
        runs-on: ubuntu-latest
        needs: build
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download artifacts
              uses: actions/download-artifact@v3
              with:
                name: built-binary

            - name: Create release
              id: create_release
              uses: softprops/actions-gh-release@v1
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                tag_name: ${{ github.ref }}
                name: Release ${{ github.ref_name }}
                draft: false
                files: |
                  dist/*.whl
                  dist/*.tar.gz
                  build/*.exe
                  build/*.bin